name: CI Pipeline

on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: |
          echo "### 🔵 TypeScript Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          set +e
          npm run typecheck | tee -a $GITHUB_STEP_SUMMARY
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo '
```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE

      - name: Prettier check
        run: |
          echo "### 🟡 Prettier Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          set +e
          npm run format:check | tee -a $GITHUB_STEP_SUMMARY
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo '
```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE

      - name: Run Tests
        run: |
          echo "### 🟢 Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          set +e
          npm run test -- --reporter=verbose | tee -a $GITHUB_STEP_SUMMARY
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE