name: CI Pipeline

on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        run: |
          echo "### TypeScript Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          set -o pipefail
          npm run typecheck | tee -a $GITHUB_STEP_SUMMARY || TS_ERR=1
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$TS_ERR" = "1" ]; then exit 1; fi

      - name: Prettier check
        run: |
          echo "### Prettier Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          npm run format:check > prettier_out.txt 2>&1 || FMT_ERR=1
          cat prettier_out.txt | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$FMT_ERR" = "1" ]; then exit 1; fi

      - name: Run Tests
        run: |
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          NO_COLOR=1 npm run test -- --reporter=verbose > test_out.txt 2>&1 || TEST_ERR=1
          cat test_out.txt | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$TEST_ERR" = "1" ]; then exit 1; fi