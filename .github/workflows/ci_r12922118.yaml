name: CI

on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript typecheck
        run: npm run typecheck:report

      - name: Upload TypeScript typecheck results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: typecheck-results.txt
          path: typecheck-results.txt

      - name: Run Prettier check
        run: npm run prettier:check:report

      - name: Upload Prettier check results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: prettier-check-results.txt
          path: prettier-check-results.txt

      - name: Run Tests
        run: npm run test:report

      - name: Upload Test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results.json
          path: test-results.json

      - name: Parse test results and upload to Summary
        if: always()
        run: |
          echo "Parsing test results..."
          jq -r '
            .results[] |
            "\(.fullName): \(.state) (\(.duration) ms)"
          ' test-results.json > test-summary.md
          echo "Test Summary:"
          cat test-summary.md
          echo "Uploading test summary to GitHub Actions Summary..."
          echo "<details><summary>Test Results</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Typecheck Results" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat typecheck-results.txt >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Prettier Check Results" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat prettier-check-results.txt >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat test-summary.md >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY