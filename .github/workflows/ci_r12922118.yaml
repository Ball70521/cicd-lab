name: CI Pipeline

on: [push]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: TypeScript typecheck
        # 加入 set -o pipefail 確保 npm 失敗時能被偵測到
        run: |
          set -o pipefail
          echo "### TypeScript Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          (npm run typecheck | tee -a $GITHUB_STEP_SUMMARY) || (echo '```' >> $GITHUB_STEP_SUMMARY && exit 1)
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Prettier check
        run: |
          set -o pipefail
          echo "### Prettier Check" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          (npm run format:check | tee -a $GITHUB_STEP_SUMMARY) || (echo '```' >> $GITHUB_STEP_SUMMARY && exit 1)
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Tests
        run: |
          set -o pipefail
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          (NO_COLOR=1 npm run test -- --reporter=verbose | tee -a $GITHUB_STEP_SUMMARY) || (echo "\`\`\`" >> $GITHUB_STEP_SUMMARY && exit 1)
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY